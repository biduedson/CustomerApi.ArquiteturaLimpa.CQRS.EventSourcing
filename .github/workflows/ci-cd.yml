name: CI/CD - Customer API

on:
  pull_request:
    branches: [ master ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ master ]

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION_NAME: 'CustomerApi.ArquiteturaLimpa.CQRS.EventSourcing.slnx'
  IMAGE_NAME: customerapi
  ACR_NAME: customerapiacr

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # baixa o código do repositório
      - name: Baixar código
        uses: actions/checkout@v4

      # instala o .NET na versão configurada
      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # restaura os pacotes NuGet do projeto
      - name: Restaurar pacotes
        run: dotnet restore ${{ env.SOLUTION_NAME }}

      # compila o projeto em modo Release
      - name: Build
        run: dotnet build ${{ env.SOLUTION_NAME }} --configuration Release --no-restore

      # roda todos os testes — se falhar, o pipeline para aqui
      - name: Testes
        run: dotnet test ${{ env.SOLUTION_NAME }} --configuration Release --no-build --verbosity normal

  build-and-push-image:
    # só roda se build-and-test passou
    needs: build-and-test
    runs-on: ubuntu-latest
    # só roda quando há push na master — não roda em PR
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      # baixa o código para gerar a imagem Docker
      - name: Baixar código
        uses: actions/checkout@v4

      # faz login no Azure Container Registry
      - name: Login no ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # gera a imagem Docker com a tag do commit
      # sobe a imagem com a tag do commit e também como latest
      - name: Build e Push da imagem Docker
        run: |
          IMAGE_TAG=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

          docker build -f src/CustomerApi.WebApi/Dockerfile -t $IMAGE_TAG .
          docker push $IMAGE_TAG

          docker tag $IMAGE_TAG ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest