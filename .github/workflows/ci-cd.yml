name: CI/CD - Customer API

on:
  pull_request:
    branches: [ master ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ master ]

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION_NAME: 'CustomerApi.ArquiteturaLimpa.CQRS.EventSourcing.slnx'
  IMAGE_NAME: customerapi
  ACR_NAME: customerapiacr

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar pacotes
        run: dotnet restore ${{ env.SOLUTION_NAME }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_NAME }} --configuration Release --no-restore

      - name: Testes
        run: dotnet test ${{ env.SOLUTION_NAME }} --configuration Release --no-build --verbosity normal

  run-migrations:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar pacotes
        run: dotnet restore ${{ env.SOLUTION_NAME }}

      - name: Instalar EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Rodar migrations
        env:
          ConnectionStrings__SqlConnection: ${{ secrets.SQL_CONNECTION_STRING }}
          ConnectionStrings__NoSqlConnection: ${{ secrets.MONGODB_CONNECTION_STRING }}
          ConnectionStrings__CacheConnection: ${{ secrets.REDIS_CONNECTION_STRING }}
        run: |
          dotnet ef database update \
            --project src/CustomerApi.WebApi \
            --startup-project src/CustomerApi.WebApi \
            --context EventStoreDbContext \
            --connection "${{ secrets.SQL_CONNECTION_STRING }}"

          dotnet ef database update \
            --project src/CustomerApi.WebApi \
            --startup-project src/CustomerApi.WebApi \
            --context WriteDbContext \
            --connection "${{ secrets.SQL_CONNECTION_STRING }}"

  build-and-push-image:
    needs: run-migrations
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Login no ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build e Push da imagem Docker
        run: |
          IMAGE_TAG=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

          docker build -f src/CustomerApi.WebApi/Dockerfile -t $IMAGE_TAG .
          docker push $IMAGE_TAG

          docker tag $IMAGE_TAG ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest